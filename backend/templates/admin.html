<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIRO IT — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2563eb; --red: #dc2626;
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --border: #334155;
    --green: #22c55e; --yellow: #f59e0b;
    --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ===== LOGIN ===== */
  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: var(--shadow); }
  .login-logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
  .login-logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg,var(--blue),var(--red)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .login-logo h1 { font-size: 1.4rem; font-weight: 700; }
  .login-logo span { color: var(--blue); }
  .login-subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text2); margin-bottom: 0.4rem; }
  .form-group input { width: 100%; padding: 0.75rem 1rem; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color .2s; }
  .form-group input:focus { border-color: var(--blue); }
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.875rem; transition: all .2s; text-decoration: none; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text2); }
  .btn-full { width: 100%; justify-content: center; }
  .error-msg { color: #f87171; font-size: 0.82rem; margin-top: 0.75rem; display: none; }

  /* ===== DASHBOARD ===== */
  #dashboard { display: none; }
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { display: flex; align-items: center; gap: 0.75rem; font-weight: 700; font-size: 1.1rem; }
  .topbar-logo i { color: var(--blue); }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .topbar-time { color: var(--text2); font-size: 0.82rem; }
  .main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .stat-card .stat-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
  .stat-card .stat-number { font-size: 2rem; font-weight: 700; }
  .stat-card .stat-sub { font-size: 0.75rem; color: var(--text2); margin-top: .25rem; }
  .stat-card.blue .stat-number { color: var(--blue); }
  .stat-card.red .stat-number { color: var(--red); }
  .stat-card.green .stat-number { color: var(--green); }
  .stat-card.yellow .stat-number { color: var(--yellow); }

  /* Tabs */
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab-btn { padding: 0.6rem 1.25rem; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all .2s; }
  .tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
  .tab-btn:hover:not(.active) { color: var(--text); border-color: var(--text2); }

  /* Table */
  .table-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-header h3 { font-size: 1rem; font-weight: 600; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { padding: 0.75rem 1rem; text-align: left; color: var(--text2); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
  .badge-new     { background: rgba(37,99,235,.2);  color: #60a5fa; }
  .badge-read    { background: rgba(34,197,94,.15); color: #4ade80; }
  .badge-pending { background: rgba(245,158,11,.15); color: #fbbf24; }
  .badge-done    { background: rgba(34,197,94,.15); color: #4ade80; }
  .badge-rejected{ background: rgba(220,38,38,.15); color: #f87171; }
  .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .action-btn { padding: 0.3rem 0.65rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 0.75rem; transition: all .2s; }
  .action-btn:hover { color: var(--text); background: var(--bg3); }
  .action-btn.del:hover { color: #f87171; border-color: #f87171; }
  .action-btn.ok:hover  { color: #4ade80; border-color: #4ade80; }
  .empty-row td { text-align: center; color: var(--text2); padding: 3rem; }

  /* Build config display */
  .build-cfg { font-size: 0.75rem; color: var(--text2); line-height: 1.6; }
  .name-col { font-weight: 600; }
  .contact-col { font-size: 0.78rem; color: var(--text2); }
  .msg-col { max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); font-size: 0.8rem; }

  /* Toast */
  .toast-area { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
  .toast { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1.2rem; font-size: .85rem; display: flex; align-items: center; gap: .6rem; box-shadow: var(--shadow); animation: fadeIn .3s ease; }
  .toast.ok  { border-left: 3px solid var(--green); }
  .toast.err { border-left: 3px solid var(--red); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* Refresh btn */
  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: .45rem .9rem; cursor: pointer; font-size: .8rem; transition: all .2s; }
  .refresh-btn:hover { color: var(--text); background: var(--bg3); }
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="fas fa-microchip"></i></div>
      <h1>SHIRO<span>IT</span></h1>
    </div>
    <p class="login-subtitle">Admin Dashboard — Secure Access</p>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <p class="error-msg" id="loginError"><i class="fas fa-times-circle"></i> Invalid credentials</p>
    <br>
    <button class="btn btn-primary btn-full" id="loginBtn">
      <i class="fas fa-unlock"></i> Sign In
    </button>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">
      <i class="fas fa-microchip"></i>
      <span>SHIRO IT Admin</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-time" id="clock"></span>
      <button class="btn btn-ghost" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card blue"><div class="stat-label">Contact Messages</div><div class="stat-number" id="s-contacts">-</div><div class="stat-sub" id="s-contacts-sub">loading...</div></div>
      <div class="stat-card yellow"><div class="stat-label">PC Build Quotes</div><div class="stat-number" id="s-quotes">-</div><div class="stat-sub" id="s-quotes-sub">loading...</div></div>
      <div class="stat-card green"><div class="stat-label">Service Bookings</div><div class="stat-number" id="s-bookings">-</div><div class="stat-sub" id="s-bookings-sub">loading...</div></div>
      <div class="stat-card red"><div class="stat-label">Job Applications</div><div class="stat-number" id="s-apps">-</div><div class="stat-sub" id="s-apps-sub">loading...</div></div>
      <div class="stat-card blue"><div class="stat-label">Appointments</div><div class="stat-number" id="s-appts">-</div><div class="stat-sub" id="s-appts-sub">loading...</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="contacts"><i class="fas fa-envelope"></i> Messages</button>
      <button class="tab-btn" data-tab="quotes"><i class="fas fa-desktop"></i> PC Quotes</button>
      <button class="tab-btn" data-tab="bookings"><i class="fas fa-tools"></i> Bookings</button>
      <button class="tab-btn" data-tab="applications"><i class="fas fa-briefcase"></i> Applications</button>
      <button class="tab-btn" data-tab="appointments"><i class="fas fa-calendar"></i> Appointments</button>
    </div>

    <!-- Panels -->
    <div class="table-panel">
      <div class="table-header">
        <h3 id="panelTitle">Contact Messages</h3>
        <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
      <div class="table-wrap">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast-area" id="toastArea"></div>

<script>
const API = '';
let activeTab = 'contacts';
let allData = {};

/* ===== CLOCK ===== */
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('en-MY', {
    dateStyle: 'medium', timeStyle: 'short'
  });
}
setInterval(updateClock, 1000);
updateClock();

/* ===== TOAST ===== */
function toast(msg, type = 'ok') {
  const area = document.getElementById('toastArea');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fas ${type === 'ok' ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${msg}`;
  area.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

/* ===== LOGIN ===== */
document.getElementById('loginBtn').addEventListener('click', async () => {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  try {
    const res = await fetch(API + '/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadStats();
      loadTab('contacts');
    } else {
      errEl.style.display = 'block';
    }
  } catch (e) {
    errEl.textContent = '⚠ Cannot connect to server. Make sure Flask is running.';
    errEl.style.display = 'block';
  }
});

// Allow Enter key on login
['loginUser','loginPass'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  })
);

// Check if already logged in (page refresh)
(async () => {
  try {
    const res = await fetch(API + '/admin/api/stats');
    if (res.ok) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadStats();
      loadTab('contacts');
    }
  } catch (_) {}
})();

/* ===== LOGOUT ===== */
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch(API + '/admin/logout', { method: 'POST' });
  location.reload();
});

/* ===== STATS ===== */
async function loadStats() {
  try {
    const res = await fetch(API + '/admin/api/stats');
    const d = await res.json();
    if (!d.success) return;
    const s = d.stats;
    document.getElementById('s-contacts').textContent = s.contacts.total;
    document.getElementById('s-contacts-sub').textContent = `${s.contacts.unread} unread`;
    document.getElementById('s-quotes').textContent = s.quotes.total;
    document.getElementById('s-quotes-sub').textContent = `${s.quotes.new} new`;
    document.getElementById('s-bookings').textContent = s.bookings.total;
    document.getElementById('s-bookings-sub').textContent = `${s.bookings.new} new`;
    document.getElementById('s-apps').textContent = s.applications.total;
    document.getElementById('s-apps-sub').textContent = `${s.applications.new} new`;
    document.getElementById('s-appts').textContent = s.appointments.total;
    document.getElementById('s-appts-sub').textContent = `${s.appointments.pending} pending`;
  } catch (_) {}
}

/* ===== TABS ===== */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    loadTab(activeTab);
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  loadTab(activeTab);
  loadStats();
});

async function loadTab(tab) {
  const endpoints = {
    contacts:     '/admin/api/contacts',
    quotes:       '/admin/api/quotes',
    bookings:     '/admin/api/bookings',
    applications: '/admin/api/applications',
    appointments: '/admin/api/appointments',
  };
  const titles = {
    contacts: 'Contact Messages', quotes: 'PC Build Quotes',
    bookings: 'Service Bookings', applications: 'Job Applications',
    appointments: 'Appointments'
  };
  document.getElementById('panelTitle').textContent = titles[tab];

  try {
    const res = await fetch(API + endpoints[tab]);
    const d = await res.json();
    if (!d.success) { renderEmpty(); return; }
    allData[tab] = d.data;
    renderTable(tab, d.data);
  } catch (_) {
    renderEmpty('Cannot connect to server.');
  }
}

function renderEmpty(msg = 'No records found.') {
  document.getElementById('tableHead').innerHTML = '';
  document.getElementById('tableBody').innerHTML = `<tr class="empty-row"><td colspan="10"><i class="fas fa-inbox"></i> ${msg}</td></tr>`;
}

function renderTable(tab, data) {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');

  if (!data || data.length === 0) { renderEmpty(); return; }

  const configs = {
    contacts: {
      cols: ['Date', 'Name', 'Contact', 'Subject', 'Message', 'Status', 'Actions'],
      row: (r) => `
        <td>${fmtDate(r.created_at)}</td>
        <td class="name-col">${esc(r.name)}</td>
        <td class="contact-col">${esc(r.email)}<br>${esc(r.phone)}</td>
        <td>${esc(r.subject)}</td>
        <td class="msg-col" title="${esc(r.message)}">${esc(r.message)}</td>
        <td>${r.is_read ? '<span class="badge badge-read">Read</span>' : '<span class="badge badge-new">Unread</span>'}</td>
        <td><div class="actions">
          ${!r.is_read ? `<button class="action-btn ok" onclick="updateStatus('contact','${r.id}','Read')"><i class="fas fa-check"></i> Mark Read</button>` : ''}
          <button class="action-btn del" onclick="deleteItem('contact','${r.id}')"><i class="fas fa-trash"></i></button>
        </div></td>`
    },
    quotes: {
      cols: ['Date', 'Customer', 'Build Config', 'Total', 'Status', 'Actions'],
      row: (r) => `
        <td>${fmtDate(r.created_at)}</td>
        <td class="name-col">${esc(r.name)}<br><span class="contact-col">${esc(r.phone)}</span></td>
        <td class="build-cfg">${fmtBuild(r.build_config)}</td>
        <td style="font-weight:600;color:var(--blue)">RM ${Number(r.total_price).toLocaleString()}</td>
        <td>${statusBadge(r.status)}</td>
        <td><div class="actions">
          <button class="action-btn ok" onclick="updateStatus('quote','${r.id}','Reviewed')"><i class="fas fa-eye"></i> Reviewed</button>
          <button class="action-btn" onclick="updateStatus('quote','${r.id}','Ordered')"><i class="fas fa-check-double"></i> Ordered</button>
          <button class="action-btn del" onclick="deleteItem('quote','${r.id}')"><i class="fas fa-trash"></i></button>
        </div></td>`
    },
    bookings: {
      cols: ['Date', 'Customer', 'Service', 'Preferred Date', 'Notes', 'Status', 'Actions'],
      row: (r) => `
        <td>${fmtDate(r.created_at)}</td>
        <td class="name-col">${esc(r.name)}<br><span class="contact-col">${esc(r.phone)}</span></td>
        <td>${esc(r.service_name)}</td>
        <td>${esc(r.preferred_date) || '<span class="contact-col">Not specified</span>'}</td>
        <td class="msg-col">${esc(r.notes) || '-'}</td>
        <td>${statusBadge(r.status)}</td>
        <td><div class="actions">
          <button class="action-btn ok" onclick="updateStatus('booking','${r.id}','Confirmed')"><i class="fas fa-check"></i> Confirm</button>
          <button class="action-btn" onclick="updateStatus('booking','${r.id}','Completed')"><i class="fas fa-flag-checkered"></i> Done</button>
          <button class="action-btn del" onclick="deleteItem('booking','${r.id}')"><i class="fas fa-trash"></i></button>
        </div></td>`
    },
    applications: {
      cols: ['Date', 'Name', 'Contact', 'Position', 'Experience', 'Resume', 'Status', 'Actions'],
      row: (r) => `
        <td>${fmtDate(r.created_at)}</td>
        <td class="name-col">${esc(r.name)}</td>
        <td class="contact-col">${esc(r.email)}<br>${esc(r.phone)}</td>
        <td>${esc(r.position)}</td>
        <td>${esc(r.experience)}</td>
        <td>${r.resume_filename ? `<a href="/admin/api/download-resume/${r.resume_filename}" class="action-btn ok" style="text-decoration:none"><i class="fas fa-download"></i> CV</a>` : '<span class="contact-col">None</span>'}</td>
        <td>${statusBadge(r.status)}</td>
        <td><div class="actions">
          <button class="action-btn ok" onclick="updateStatus('application','${r.id}','Shortlisted')"><i class="fas fa-star"></i> Shortlist</button>
          <button class="action-btn del" onclick="updateStatus('application','${r.id}','Rejected')"><i class="fas fa-times"></i> Reject</button>
          <button class="action-btn del" onclick="deleteItem('application','${r.id}')"><i class="fas fa-trash"></i></button>
        </div></td>`
    },
    appointments: {
      cols: ['Date', 'Customer', 'Contact', 'Service', 'Requested Date', 'Status', 'Actions'],
      row: (r) => `
        <td>${fmtDate(r.created_at)}</td>
        <td class="name-col">${esc(r.name)}</td>
        <td class="contact-col">${esc(r.email)}<br>${esc(r.phone)}</td>
        <td>${esc(r.service_type || r.service || '-')}</td>
        <td>${esc(r.preferred_date) || '-'}</td>
        <td>${statusBadge(r.status)}</td>
        <td><div class="actions">
          <button class="action-btn ok" onclick="updateStatus('appointment','${r.id}','Confirmed')"><i class="fas fa-check"></i> Confirm</button>
          <button class="action-btn del" onclick="deleteItem('appointment','${r.id}')"><i class="fas fa-trash"></i></button>
        </div></td>`
    }
  };

  const cfg = configs[tab];
  head.innerHTML = `<tr>${cfg.cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
  body.innerHTML = data.map(r => `<tr>${cfg.row(r)}</tr>`).join('');
}

/* ===== ACTIONS ===== */
async function updateStatus(type, id, status) {
  try {
    const res = await fetch(API + '/admin/api/update-status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, id, status })
    });
    const d = await res.json();
    if (d.success) { toast(`Status updated to "${status}"`); loadTab(activeTab); loadStats(); }
    else toast(d.error || 'Update failed', 'err');
  } catch (_) { toast('Server error', 'err'); }
}

async function deleteItem(type, id) {
  if (!confirm('Delete this record? This cannot be undone.')) return;
  try {
    const res = await fetch(API + '/admin/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, id })
    });
    const d = await res.json();
    if (d.success) { toast('Record deleted', 'ok'); loadTab(activeTab); loadStats(); }
    else toast(d.error || 'Delete failed', 'err');
  } catch (_) { toast('Server error', 'err'); }
}

/* ===== HELPERS ===== */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('en-MY', { dateStyle: 'short', timeStyle: 'short' });
}
function statusBadge(s) {
  const map = { 'New':'badge-new', 'Unread':'badge-new', 'Read':'badge-read',
    'Confirmed':'badge-done', 'Completed':'badge-done', 'Shortlisted':'badge-done', 'Ordered':'badge-done',
    'Pending':'badge-pending', 'Reviewed':'badge-pending',
    'Rejected':'badge-rejected' };
  const cls = map[s] || 'badge-new';
  return `<span class="badge ${cls}">${s || 'New'}</span>`;
}
function fmtBuild(cfg) {
  if (!cfg || typeof cfg !== 'object') return '-';
  return Object.entries(cfg).map(([k,v]) => `<b>${k}:</b> ${v}`).join('<br>');
}
