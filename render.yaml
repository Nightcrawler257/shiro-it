databases:
  - name: shiro-it-db
    plan: free
    databaseName: shiro_it

services:
  - type: web
    name: shiro-it
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: MONGO_URI
        sync: false # You'll set this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
